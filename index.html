<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QRSA Pro v2</title>

<style>
body { font-family:Arial; padding:15px; background:#f5f5f5;}
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px;}
input, select, button { width:100%; padding:8px; margin-top:6px;}
.bar { height:10px; background:lightblue; margin-top:5px;}
</style>
</head>

<body>

<h2>📊 QRSA Dashboard v2</h2>

<div class="card">
<h3>📊 Category Holdings</h3>

<div>CN
<select id="etf1">
<option>ICHA.L</option>
</select>
<input id="q1" placeholder="quantity">
<input id="p1" placeholder="price">
<p id="v1"></p>
</div>

<div>US/EU/GLD
<select id="etf2">
<option>CSUS.L</option>
<option>VWCG.L</option>
<option>IGLN.L</option>
</select>
<input id="q2">
<input id="p2">
<p id="v2"></p>
</div>

<div>US/EM/GLD
<select id="etf3">
<option>CSUS.L</option>
<option>EIMI.L</option>
<option>IGLN.L</option>
</select>
<input id="q3">
<input id="p3">
<p id="v3"></p>
</div>

<div>US/UST
<select id="etf4">
<option>CSUS.L</option>
<option>IBTA.L</option>
</select>
<input id="q4">
<input id="p4">
<p id="v4"></p>
</div>

<button onclick="calcAll()">更新數值</button>

</div>

<div class="card">
<h3>📊 Allocation</h3>

<p>CN <span id="a1"></span>%</p><div class="bar" id="b1"></div>
<p>US/EU/GLD <span id="a2"></span>%</p><div class="bar" id="b2"></div>
<p>US/EM/GLD <span id="a3"></span>%</p><div class="bar" id="b3"></div>
<p>US/UST <span id="a4"></span>%</p><div class="bar" id="b4"></div>

</div>

<div class="card">
<h3>⚖️ Rebalance</h3>
<button onclick="rebalance()">計算</button>
<p id="reb"></p>
</div>

<div class="card">
<h3>🔁 Switch ETF（分開）</h3>

<div>Category 1
<input id="sv1" placeholder="current value">
<select id="se1"><option>ICHA.L</option></select>
<input id="sp1" placeholder="new price">
<p id="sr1"></p>
</div>

<div>Category 2
<input id="sv2">
<select id="se2">
<option>CSUS.L</option>
<option>VWCG.L</option>
<option>IGLN.L</option>
</select>
<input id="sp2">
<p id="sr2"></p>
</div>

<div>Category 3
<input id="sv3">
<select id="se3">
<option>CSUS.L</option>
<option>EIMI.L</option>
<option>IGLN.L</option>
</select>
<input id="sp3">
<p id="sr3"></p>
</div>

<div>Category 4
<input id="sv4">
<select id="se4">
<option>CSUS.L</option>
<option>IBTA.L</option>
</select>
<input id="sp4">
<p id="sr4"></p>
</div>

<button onclick="calcSwitchAll()">計算全部</button>

</div>

<script>
function val(q,p){
  return (q||0)*(p||0);
}

function calcAll(){
  let v1=val(q1.value,p1.value);
  let v2=val(q2.value,p2.value);
  let v3=val(q3.value,p3.value);
  let v4=val(q4.value,p4.value);

  document.getElementById("v1").innerText=v1.toFixed(2);
  document.getElementById("v2").innerText=v2.toFixed(2);
  document.getElementById("v3").innerText=v3.toFixed(2);
  document.getElementById("v4").innerText=v4.toFixed(2);

  let total=v1+v2+v3+v4;

  let a1=v1/total*100||0;
  let a2=v2/total*100||0;
  let a3=v3/total*100||0;
  let a4=v4/total*100||0;

  ["a1","a2","a3","a4"].forEach((id,i)=>{
    let val=[a1,a2,a3,a4][i];
    document.getElementById(id).innerText=val.toFixed(1);
    document.getElementById("b"+(i+1)).style.width=val+"%";
  });
}

function rebalance(){
  let v=[v1.innerText,v2.innerText,v3.innerText,v4.innerText].map(Number);
  let total=v.reduce((a,b)=>a+b,0);
  let target=total*0.25;

  let out=v.map(x=>(x-target).toFixed(2)).join("<br>");
  document.getElementById("reb").innerHTML=out+"<br>(正=賣 負=買)";
}

function calcSwitchAll(){
  for(let i=1;i<=4;i++){
    let val=parseFloat(document.getElementById("sv"+i).value)||0;
    let price=parseFloat(document.getElementById("sp"+i).value)||0;

    if(!price) continue;

    let qty=Math.floor(val/price);
    let remain=val-qty*price;

    document.getElementById("sr"+i).innerHTML=
      `買 ${qty} 股<br>剩餘 ${remain.toFixed(2)}`;
  }
}
</script>

</body>
</html>
