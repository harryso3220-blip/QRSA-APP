<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QRSA Pro v4</title>

<style>
body { font-family:-apple-system; padding:15px; background:linear-gradient(#eef2ff,#f8fafc);}
.card { background:white; padding:15px; margin-bottom:15px; border-radius:14px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
input, select, button { width:100%; padding:10px; margin-top:6px; border-radius:8px; border:1px solid #ddd;}
button { background:#4f46e5; color:white; font-weight:bold;}
.bar { height:10px; background:#6366f1; border-radius:6px;}
</style>
</head>

<body>

<h2>📊 QRSA Pro v4</h2>

<div class="card">
<h3>🏦 Portfolio</h3>
<select id="portfolio" onchange="loadData()">
<option>HARRYSO</option>
<option>GOMAMAME</option>
</select>
</div>

<div class="card">
<h3>🔄 自動價格</h3>
<button onclick="fetchPrices()">更新市場價格</button>
<p id="status"></p>
</div>

<div class="card">
<h3>📊 Category Holdings</h3>

<div>CN
<select id="etf1">
<option value="ICHA.L">ICHA</option>
<option value="CASH">Cash</option>
</select>
<input id="q1" placeholder="quantity">
<input id="p1" placeholder="price">
<p id="v1"></p>
</div>

<div>US/EU/GLD
<select id="etf2">
<option>CSUS.L</option>
<option>VWCG.L</option>
<option>IGLN.L</option>
</select>
<input id="q2">
<input id="p2">
<p id="v2"></p>
</div>

<div>US/EM/GLD
<select id="etf3">
<option>CSUS.L</option>
<option>EIMI.L</option>
<option>IGLN.L</option>
</select>
<input id="q3">
<input id="p3">
<p id="v3"></p>
</div>

<div>US/UST
<select id="etf4">
<option>CSUS.L</option>
<option>IBTA.L</option>
</select>
<input id="q4">
<input id="p4">
<p id="v4"></p>
</div>

<button onclick="calcAll()">更新數值</button>
</div>

<div class="card">
<h3>📊 Allocation</h3>
<p>CN <span id="a1"></span>%</p><div class="bar" id="b1"></div>
<p>US/EU/GLD <span id="a2"></span>%</p><div class="bar" id="b2"></div>
<p>US/EM/GLD <span id="a3"></span>%</p><div class="bar" id="b3"></div>
<p>US/UST <span id="a4"></span>%</p><div class="bar" id="b4"></div>
</div>

<div class="card">
<h3>⚖️ Rebalance</h3>
<button onclick="rebalance()">計算</button>
<p id="reb"></p>
</div>

<div class="card">
<h3>🔁 Switch ETF</h3>

<div>Category 1
<input id="sv1">
<select id="se1"><option>ICHA.L</option></select>
<input id="sp1" placeholder="new price">
<p id="sr1"></p>
</div>

<div>Category 2
<input id="sv2">
<select id="se2">
<option>CSUS.L</option>
<option>VWCG.L</option>
<option>IGLN.L</option>
</select>
<input id="sp2">
<p id="sr2"></p>
</div>

<div>Category 3
<input id="sv3">
<select id="se3">
<option>CSUS.L</option>
<option>EIMI.L</option>
<option>IGLN.L</option>
</select>
<input id="sp3">
<p id="sr3"></p>
</div>

<div>Category 4
<input id="sv4">
<select id="se4">
<option>CSUS.L</option>
<option>IBTA.L</option>
</select>
<input id="sp4">
<p id="sr4"></p>
</div>

<button onclick="calcSwitchAll()">計算全部</button>
</div>

<script>
const ETFs = ["CSUS.L","VWCG.L","IGLN.L","IBTA.L","EIMI.L","ICHA.L"];
let prices = {};
let data = JSON.parse(localStorage.getItem("qrsa")) || {};

function getP(){ return document.getElementById("portfolio").value; }

function loadData(){
  let p=data[getP()]||{};
  ["q1","q2","q3","q4"].forEach(id=>{
    document.getElementById(id).value=p[id]||"";
  });
}

function saveData(){
  let p={};
  ["q1","q2","q3","q4"].forEach(id=>{
    p[id]=document.getElementById(id).value;
  });
  data[getP()]=p;
  localStorage.setItem("qrsa",JSON.stringify(data));
}

async function fetchPrices(){
  let url="https://query1.finance.yahoo.com/v7/finance/quote?symbols="+ETFs.join(",");
  let res=await fetch(url);
  let d=await res.json();

  d.quoteResponse.result.forEach(e=>{
    prices[e.symbol]=e.regularMarketPrice;
  });

  // auto fill price
  p1.value = (etf1.value=="CASH")?1:prices[etf1.value]||"";
  p2.value = prices[etf2.value]||"";
  p3.value = prices[etf3.value]||"";
  p4.value = prices[etf4.value]||"";

  document.getElementById("status").innerText="✅ 價格已更新";
}

function val(q,p){ return (q||0)*(p||0); }

function calcAll(){
  let p1v=(etf1.value=="CASH")?1:parseFloat(p1.value)||0;

  let v1=val(q1.value,p1v);
  let v2=val(q2.value,p2.value);
  let v3=val(q3.value,p3.value);
  let v4=val(q4.value,p4.value);

  v1El.innerText=v1.toFixed(2);
  v2.innerText=v2.toFixed(2);
  v3.innerText=v3.toFixed(2);
  v4.innerText=v4.toFixed(2);

  let total=v1+v2+v3+v4;

  let arr=[v1,v2,v3,v4];
  arr.forEach((v,i)=>{
    let pct=v/total*100||0;
    document.getElementById("a"+(i+1)).innerText=pct.toFixed(1);
    document.getElementById("b"+(i+1)).style.width=pct+"%";

    document.getElementById("sv"+(i+1)).value=v.toFixed(2);
  });

  saveData();
}

function rebalance(){
  let v=[sv1.value,sv2.value,sv3.value,sv4.value].map(Number);
  let total=v.reduce((a,b)=>a+b,0);
  let target=total*0.25;

  let out=v.map(x=>(x-target).toFixed(2)).join("<br>");
  document.getElementById("reb").innerHTML=out+"<br>(正=賣 負=買)";
}

function calcSwitchAll(){
  for(let i=1;i<=4;i++){
    let val=parseFloat(document.getElementById("sv"+i).value)||0;
    let price=parseFloat(document.getElementById("sp"+i).value)||0;

    if(!price) continue;

    let qty=Math.floor(val/price);
    let remain=val-qty*price;

    document.getElementById("sr"+i).innerHTML=
      `買 ${qty} 股<br>剩餘 ${remain.toFixed(2)}`;
  }
}
</script>

</body>
</html>
