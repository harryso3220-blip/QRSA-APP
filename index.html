<!DOCTYPE html>
<html>
<head>
  <title>QRSA Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body { font-family: Arial; padding: 15px; background: #f5f5f5; }
    h1 { text-align: center; }
    .card {
      background: white;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 10px;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<h1>📊 QRSA Dashboard</h1>

<div class="card">
  <h3>💰 Portfolio</h3>
  <p>Total: <span id="total">0</span></p>
  <input id="monthly" type="number" placeholder="Monthly input">
  <button onclick="addMonthly()">Add Monthly</button>
</div>

<div class="card">
  <h3>🔄 ETF 價格</h3>
  <button onclick="fetchPrices()">更新價格</button>
  <p id="status"></p>
</div>

<div class="card">
  <h3>📊 Category（核心）</h3>

  <div>CN：
    <select id="c1">
      <option value="ICHA.L">ICHA</option>
    </select>
    <input id="v1" placeholder="value">
  </div>

  <div>US/EU/GLD：
    <select id="c2">
      <option value="CSUS.L">CSUS</option>
      <option value="VWCG.L">VWCG</option>
      <option value="IGLN.L">IGLN</option>
    </select>
    <input id="v2" placeholder="value">
  </div>

  <div>US/EM/GLD：
    <select id="c3">
      <option value="CSUS.L">CSUS</option>
      <option value="EIMI.L">EIMI</option>
      <option value="IGLN.L">IGLN</option>
    </select>
    <input id="v3" placeholder="value">
  </div>

  <div>US/UST：
    <select id="c4">
      <option value="CSUS.L">CSUS</option>
      <option value="IBTA.L">IBTA</option>
    </select>
    <input id="v4" placeholder="value">
  </div>

  <button onclick="saveData()">保存</button>
</div>

<div class="card">
  <h3>⚖️ Rebalance（最重要🔥）</h3>
  <button onclick="rebalance()">計算 Rebalance</button>
  <p id="rebalanceResult"></p>
</div>

<script>
const ETFs = ["CSUS.L","VWCG.L","IGLN.L","IBTA.L","EIMI.L","ICHA.L"];
let prices = {};
let total = localStorage.getItem("total") || 0;

document.getElementById("total").innerText = total;

// Load saved category values
["v1","v2","v3","v4"].forEach(id => {
  document.getElementById(id).value = localStorage.getItem(id) || "";
});

function addMonthly() {
  let val = parseFloat(document.getElementById("monthly").value);
  if (!val) return;
  total = parseFloat(total) + val;
  localStorage.setItem("total", total);
  document.getElementById("total").innerText = total;
}

function saveData() {
  ["v1","v2","v3","v4"].forEach(id => {
    localStorage.setItem(id, document.getElementById(id).value);
  });
  alert("已保存");
}

async function fetchPrices() {
  const url = "https://query1.finance.yahoo.com/v7/finance/quote?symbols=" + ETFs.join(",");
  const res = await fetch(url);
  const data = await res.json();

  data.quoteResponse.result.forEach(e => {
    prices[e.symbol] = e.regularMarketPrice;
  });

  document.getElementById("status").innerText = "✅ 已更新";
}

function rebalance() {
  let v1 = parseFloat(document.getElementById("v1").value) || 0;
  let v2 = parseFloat(document.getElementById("v2").value) || 0;
  let v3 = parseFloat(document.getElementById("v3").value) || 0;
  let v4 = parseFloat(document.getElementById("v4").value) || 0;

  let total = v1 + v2 + v3 + v4;
  if (total === 0) return;

  let target = total * 0.25;

  let r1 = (v1 - target).toFixed(2);
  let r2 = (v2 - target).toFixed(2);
  let r3 = (v3 - target).toFixed(2);
  let r4 = (v4 - target).toFixed(2);

  document.getElementById("rebalanceResult").innerHTML =
    `CN: ${r1}<br>
     US/EU/GLD: ${r2}<br>
     US/EM/GLD: ${r3}<br>
     US/UST: ${r4}<br>
     (正數=賣出 / 負數=買入)`;
}
</script>

</body>
</html>
